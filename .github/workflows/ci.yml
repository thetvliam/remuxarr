name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile (syntax check)
        run: python -m compileall -q app

      - name: Import check
        # DATABASE_PATH/TEMP_DIR default to /config and /tmp/remuxarr, which
        # aren't writable by the CI runner — point them at a temp dir instead.
        env:
          REMUXARR_DATABASE_PATH: /tmp/remuxarr-ci/remuxarr.db
          REMUXARR_TEMP_DIR: /tmp/remuxarr-ci/tmp
        run: python -c "import app.main"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
