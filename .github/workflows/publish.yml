name: Build and Publish Docker Image

# Deliberately separate from the existing build-and-test workflow, and
# deliberately NOT triggered on pull_request — only a push that's already
# landed on main (i.e. from someone with actual write access) should ever
# publish a public image. Triggering this from PRs (especially from forks)
# would be a real security concern, not just noise.
on:
  push:
    branches:
      - main      # Triggers for stable updates
      - testing   # Triggers for dev updates
  workflow_dispatch:   # allows a manual, on-demand run from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # resolves to thetvliam/remuxarr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required for GITHUB_TOKEN to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # No secret to create or manage — GITHUB_TOKEN is generated
          # automatically for every workflow run.

      - name: Extract tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # If on main, it gets :latest. If on testing, it gets :testing.
            type=ref,event=branch
            # Keeps your commit SHA for safe rollbacks
            type=sha,prefix=,format=short
          # Produces e.g. ghcr.io/thetvliam/remuxarr:latest and
          # ghcr.io/thetvliam/remuxarr:a1b2c3d — the short commit SHA tag
          # gives a stable, exact reference to roll back to if a "latest"
          # build ever turns out to have a problem.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GitHub Actions' own build cache — meaningfully speeds up
          # subsequent builds, since layers (npm install, pip install,
          # the ffmpeg download) can be reused across runs instead of
          # starting from scratch every single push.
