name: Build and Publish Docker Image

# Deliberately separate from the existing build-and-test workflow, and
# deliberately NOT triggered on pull_request — only a push that's already
# landed on main or testing (i.e. from someone with actual write access)
# should ever publish an image. Triggering this from PRs (especially from
# forks) would be a real security concern, not just noise.
on:
  push:
    branches:
      - main      # Triggers for stable updates
      - testing   # Triggers for dev updates
  workflow_dispatch:   # allows a manual, on-demand run from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # resolves to thetvliam/remuxarr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required for GITHUB_TOKEN to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # No secret to create or manage — GITHUB_TOKEN is generated
          # automatically for every workflow run.

      # tags rules, explained (kept OUTSIDE the `tags: |` block deliberately
      # — a genuine bug, found and fixed here: a previous version of this
      # workflow had these same explanations written as "# ..." lines
      # INSIDE the tags: | block scalar. Inside a YAML literal block scalar,
      # every line — including ones starting with "#" — is literal STRING
      # CONTENT, not a YAML comment; confirmed directly against a YAML
      # parser. So docker/metadata-action was actually receiving each
      # explanatory line as if it were its own malformed tag-rule entry,
      # mixed in with the three real ones, which broke tag generation and
      # failed the "Extract tags and labels" step outright (a GitHub.com
      # HTML error page, not a normal action failure — consistent with the
      # action's tag-rule parsing going somewhere unexpected on the garbled
      # input rather than failing cleanly).
      #
      #   type=raw,value=latest,enable={{is_default_branch}} — :latest tag
      #     ONLY on the default branch (main); this enable= condition is
      #     what makes that automatic — it does NOT happen implicitly for
      #     branch pushes the way it does for version-tag pushes (semver).
      #   type=ref,event=branch — a tag matching the branch name itself:
      #     main -> :main, testing -> :testing, any-branch -> :any-branch.
      #   type=sha,prefix=,format=short — the short commit SHA, e.g.
      #     :a1b2c3d, giving a stable, exact reference to roll back to if
      #     a moving tag (:latest / :testing) ever turns out to have a
      #     problem.
      - name: Extract tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GitHub Actions' own build cache — meaningfully speeds up
          # subsequent builds, since layers (npm install, pip install,
          # the ffmpeg download) can be reused across runs instead of
          # starting from scratch every single push.
