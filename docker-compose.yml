services:
  remuxarr:
    build: .
    container_name: remuxarr
    restart: unless-stopped

    ports:
      - "9191:9191"   # Web UI + API

    volumes:
      # Persistent config/DB — map to a host path that survives updates.
      # :Z (uppercase) = SELinux PRIVATE label, exclusive to this
      # container. Correct here specifically because nothing else needs
      # this path — it's Remuxarr's own database and settings alone.
      # Harmless no-op on non-SELinux hosts (e.g. stock Unraid) — safe
      # to leave in either way.
      - ./config:/config:Z

      # Your media library — adjust to match your own library paths.
      # :z (LOWERCASE) = SELinux SHARED label — deliberately the
      # opposite of :Z above. Sonarr, Radarr, and Plex (in their own,
      # separate containers) almost certainly mount these same host
      # paths too — :Z here would mark them exclusive to Remuxarr and
      # risk a real conflict with those other containers over the same
      # directories. Same no-op guarantee on non-SELinux hosts.
      #
      # NOTE: on an SELinux-enabled host, the very first container start
      # after adding this relabels every file under the mount — can take
      # a real while on a large library. Only happens once.
      - /path/to/your/movies:/media/movies:rw,z
      - /path/to/your/tv:/media/tv:rw,z

    # Reads from .env (see .env.example). Every variable there already
    # matches this app's own built-in default (see app/config.py) — an
    # untouched .env with nothing uncommented is completely fine, this
    # is only for the handful of cases you actually want to override.
    env_file:
      - .env

    # Stages FFmpeg's temp output here before the final move (see
    # _pick_temp_dir in app/core/ffmpeg.py) — tmpfs (RAM-backed) so
    # processing never writes intermediate files to your media disk.
    # Safe to remove this block entirely if you'd rather it just use
    # regular container storage — still works, just slower, since the
    # app falls back to the output file's own directory automatically
    # whenever this path isn't usable.
    tmpfs:
      - /tmp/remuxarr

    # Give FFmpeg enough room — adjust to your hardware
    # cpus: "2.0"
    # mem_limit: 4g
